task: "pln"
output_root: "outputs"
output_version: "inject_attn_640_2"
# output_version: "test"

backup_name: "weights"
log_name: "logs"

labels: ["aeroplane", "bicycle", "bird", "boat", "bottle", "bus", "car", "cat", "chair", "cow", "diningtable", "dog", "horse", "motorbike", "person", "pottedplant", "sheep", "sofa", "train", "tvmonitor"]

image_root: "/root/hmp/VOC/VOCdevkit"
path_remap:
    "/data/hmp/VOC/VOCdevkit": "/root/hmp/VOC/VOCdevkit"
grid_size: 20
backbone_pretrained: True
point_weight: 1.0
coord_weight: 2.0
link_weight: 0.5
class_weight: 0.5
eval_iou_thresholds: [0.5, 0.75]
eval_metric_name: "mAP@0.5"
eval_write_results: False

train:
    train_list: "./data/voc_pln_cache/train.txt"
    eval_test_list: "./data/voc_pln_cache/test_640.txt"
    stdout: True
    gpus: "0,1"
    nworkers: 8
    pin_mem: True
    eval_nworkers: 4
    eval_pin_mem: True
    async_eval: True
    async_eval_gpus: "0,1"

    momentum: 0.9
    decay: 0.00004
    clear: False
    # flip: 0.5
    # jitter: 0.2
    # crop_min_area: 0.2
    # brightness: 0.15
    # contrast: 0.15
    # hue: 0.05
    # saturation: 1.5
    # value: 1.5
    # grayscale: 0.05
    # blur: 0.1
    # noise_std: 0.0
    flip: 0.5
    jitter: 0.2
    crop_min_area: 0.2
    brightness: 0.0
    contrast: 0.0
    hue: 0.0
    saturation: 1.0
    value: 1.0
    grayscale: 0.0
    blur: 0.0
    noise_std: 0.0

    lr_policy: "cosine_warmup"
    warmup_lr: 0.001
    max_lr: 0.005
    min_lr: 0.0004
    warmup_batches: 500
    cosine_total_batches: 30000
    backbone_lr_mult: 0.1
    lr_steps: [4000, 12000, 20000]
    lr_rates: [0.005, 0.001, 0.0001]
    max_batches: 30000
    resize_interval: 10

    backup_interval: 4000
    backup_steps: [4000]
    backup_rates: [4000]
    eval_interval: 4000
    eval_batch_size: 16

    input_shape: [640, 640]
    batch_size: 64
    mini_batch_size: 64
    weights: ~
    p_thresh: 0.1
    score_thresh: 0.1
    nms_score_thresh: 0.1
    nms_thresh: 0.5
    min_size: 0.0
    aspect_ratio_threshold: 100.0
    overlap_threshold: 1.5
    center_dist_threshold: 0.0
    area_ratio_threshold: 0.5
    pre_nms_topk: 512
    max_detections: 0
    eval_results: "results/PLNResnet18"

test:
    test_list: "./data/voc_pln_cache/test_640.txt"
    stdout: True
    gpus: "0,1"
    nworkers: 4
    pin_mem: True

    input_shape: [640, 640]
    batch_size: 8
    weights: "outputs/PLNResnet18/inject_attn/weights/best.pt"
    p_thresh: 0.1
    score_thresh: 0.1
    nms_score_thresh: 0.1
    nms_thresh: 0.5
    min_size: 0.0
    aspect_ratio_threshold: 100.0
    overlap_threshold: 1.5
    center_dist_threshold: 0.0
    area_ratio_threshold: 0.5
    pre_nms_topk: 512
    max_detections: 0
    results: "results/PLNResnet18"

speed:
    gpus: "0"
    batch_size: 1
    max_iters: 200
    input_shape: [640, 640]
